# [LOCAL-FORK] Nginx reverse proxy for dashboard that strips Secure flag from cookies.
# This allows the dashboard to work over plain HTTP on a local network.

map $upstream_http_set_cookie $modified_cookie {
    "~^(.*)(;\s*Secure)(.*)" "$1$3";
    default $upstream_http_set_cookie;
}

server {
    listen 3000;
    server_name _;

    location / {
        proxy_pass http://dashboard-internal:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Hide the original Set-Cookie and replace with stripped version
        proxy_hide_header Set-Cookie;
        add_header Set-Cookie $modified_cookie always;
    }
}
